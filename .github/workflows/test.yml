name: Build Offline Download

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

jobs:
  build-offline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Make scripts executable
        run: |
          chmod +x ./gradlew || true
          chmod +x CompileEPK || true
          chmod +x CompileJS || true
          chmod +x MakeOfflineDownload || true

      - name: Run CompileEPK
        run: ./CompileEPK

      - name: Run CompileJS
        run: ./CompileJS

      - name: Run MakeOfflineDownload
        run: ./MakeOfflineDownload

      - name: Copy offline download to Client/Test.html
        run: |
          mkdir -p Client

          FILE=$(find javascript -type f \( -name "*.html" -o -name "*.htm" \) | head -n 1)

          if [ -z "$FILE" ]; then
            echo "No offline HTML file found!"
            exit 1
          fi

          cp "$FILE" Client/Test.html

      - name: Commit and push Test.html
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Client/Test.html

          git commit -m "Auto-build offline download" || echo "No changes to commit"

          git push