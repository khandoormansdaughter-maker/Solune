name: Build Eaglercraft Offline Download

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository with push permissions
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          fetch-depth: 0

      # Java setup
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin

      # Make scripts executable
      - name: Grant execute permissions on scripts
        run: |
          chmod +x CompileEPK.sh
          chmod +x CompileJS.sh
          chmod +x MakeOfflineDownload.sh

      # Build steps
      - name: Run CompileEPK
        run: ./CompileEPK.sh

      - name: Run CompileJS
        run: ./CompileJS.sh

      - name: Run MakeOfflineDownload
        run: ./MakeOfflineDownload.sh

      # Prepare output directory
      - name: Create Lumina output directory
        run: mkdir -p Lumina

      # Select correct offline HTML
      - name: Copy offline download to Lumina/Lumina.html
        run: |
          if [ -f "javascript/Eaglercraft_1.12_Offline_en_US.html" ]; then
            OFFLINE_FILE="javascript/Eaglercraft_1.12_Offline_en_US.html"
          elif [ -f "javascript/Eaglercraft_1.12_Offline_International.html" ]; then
            OFFLINE_FILE="javascript/Eaglercraft_1.12_Offline_International.html"
          else
            echo "Error: No offline HTML file found"
            echo "Contents of javascript/:"
            ls -R javascript/
            exit 1
          fi

          cp "$OFFLINE_FILE" Lumina/Lumina.html
          echo "Copied $OFFLINE_FILE -> Lumina/Lumina.html"

      # Commit and push only if changed
      - name: Commit and push Lumina/Lumina.html
        if: github.event_name != 'pull_request'
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

          git add Lumina/Lumina.html

          if ! git diff --staged --quiet; then
            git commit -m "ci: update Lumina/Lumina.html offline build [skip ci]"
            git push origin HEAD:${GITHUB_REF_NAME}
          else
            echo "No changes to commit"
          fi